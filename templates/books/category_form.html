{% extends 'base.html' %}

{% block title %}{{ title }} - BookStore{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow p-4 p-md-5">
            <h3 class="fw-bold mb-4 text-dark">{{ title }}</h3>
            
            <form method="POST" action="">
                {% csrf_token %}
                
                {% for field in form %}
                    <div class="mb-3">
                        <label for="{{ field.id_for_label }}" class="form-label fw-medium">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small mt-1">{% for error in field.errors %}{{ error }}{% endfor %}</div>
                        {% endif %}
                    </div>
                {% endfor %}
                
                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a href="{% url 'books:admin_dashboard' %}" class="btn btn-outline-secondary px-4 rounded-pill">Hủy bỏ</a>
                    <button type="submit" class="btn btn-primary px-4 rounded-pill">Lưu lại</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
