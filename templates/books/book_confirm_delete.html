{% extends 'base.html' %}

{% block title %}Xóa sách - BookStore{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card border-0 shadow-lg p-4 p-md-5 text-center">
            <i class="bi bi-exclamation-triangle text-danger fs-1 mb-3"></i>
            <h3 class="fw-bold mb-3 text-dark">Xác nhận xóa sách</h3>
            <p class="text-secondary mb-4">Bạn có chắc chắn muốn xóa cuốn sách <strong>"{{ book.title }}"</strong> của tác giả <em>{{ book.author }}</em>? Hành động này không thể hoàn tác.</p>
            
            <form method="POST" action="">
                {% csrf_token %}
                <div class="d-flex justify-content-center gap-2">
                    <a href="{% url 'books:admin_dashboard' %}" class="btn btn-outline-secondary px-4 rounded-pill">Quay lại</a>
                    <button type="submit" class="btn btn-danger px-4 rounded-pill">Xóa sách</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
